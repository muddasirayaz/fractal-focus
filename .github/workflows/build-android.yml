name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap paths (skips interactive download prompt)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > "$HOME/.bubblewrap/config.json"
          echo "Bubblewrap config:"
          cat "$HOME/.bubblewrap/config.json"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias fractalfocus \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore fractalfocus.keystore \
            -storepass fractalfocus123 \
            -keypass fractalfocus123 \
            -dname "CN=ContentFlip, OU=Apps, O=ContentFlip, L=Buffalo, ST=NY, C=US"

      - name: Initialize Bubblewrap (non-interactive)
        run: |
          yes "" | bubblewrap init \
            --manifest="https://muddasirayaz.github.io/fractal-focus/manifest.json" \
            --directory=. || true
          echo "=== Init complete ==="
          ls -la

      - name: Patch twa-manifest.json
        run: |
          node -e "
            const fs = require('fs');
            let m = {};
            try { m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8')); } catch(e) {}
            m.packageId = 'com.contentflip.fractalfocus';
            m.host = 'muddasirayaz.github.io';
            m.name = 'Fractal Focus: Pomodoro Timer';
            m.launcherName = 'Fractal Focus';
            m.display = 'standalone';
            m.themeColor = '#08080d';
            m.themeColorDark = '#08080d';
            m.navigationColor = '#08080d';
            m.navigationColorDark = '#08080d';
            m.backgroundColor = '#08080d';
            m.startUrl = '/fractal-focus/index.html';
            m.orientation = 'portrait';
            m.signingKey = { path: './fractalfocus.keystore', alias: 'fractalfocus' };
            m.appVersionCode = 1;
            m.appVersionName = '1.0.0';
            m.fullScopeUrl = 'https://muddasirayaz.github.io/fractal-focus/';
            m.webManifestUrl = 'https://muddasirayaz.github.io/fractal-focus/manifest.json';
            m.iconUrl = 'https://muddasirayaz.github.io/fractal-focus/icons/icon-512.png';
            m.maskableIconUrl = 'https://muddasirayaz.github.io/fractal-focus/icons/icon-512.png';
            m.fallbackType = 'customtabs';
            m.enableNotifications = false;
            m.enableSiteSettingsShortcut = true;
            m.isChromeOSOnly = false;
            m.isMetaQuest = false;
            m.minSdkVersion = 19;
            m.shortcuts = [];
            m.generatorApp = 'bubblewrap-cli';
            m.splashScreenFadeOutDuration = 300;
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Patched twa-manifest.json');
          "

      - name: Update project from patched manifest
        run: |
          yes "" | bubblewrap update --manifest=. || true

      - name: Build signed APK and AAB
        run: |
          echo -e "fractalfocus123\nfractalfocus123" | bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=./fractalfocus.keystore \
            --signingKeyAlias=fractalfocus

      - name: Show signing fingerprint
        run: |
          echo "========================================="
          echo "  SAVE THIS SHA-256 FINGERPRINT"
          echo "  You need it for assetlinks.json"
          echo "========================================="
          keytool -list -v \
            -keystore fractalfocus.keystore \
            -alias fractalfocus \
            -storepass fractalfocus123 | grep -i sha256 || true

      - name: Find all build outputs
        run: |
          echo "=== APK and AAB files ==="
          find . -name "*.apk" -o -name "*.aab" | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fractal-focus-android
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn

      - name: Upload keystore (SAVE FOREVER)
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-NEVER-LOSE-THIS
          path: fractalfocus.keystore
